services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobbot
      POSTGRES_USER: jobbot
      POSTGRES_PASSWORD: jobbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /workspace
    env_file:
      - .env
    command: bash -lc "pip install -e .[dev] && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    env_file:
      - .env
    command: bash -lc "pip install -e .[dev] && celery -A apps.worker.worker_main.celery_app worker -l info"
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - redis

  dashboard:
    image: node:22-alpine
    working_dir: /workspace/apps/dashboard
    command: sh -lc "npm install && npm run dev"
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"

volumes:
  postgres_data:

